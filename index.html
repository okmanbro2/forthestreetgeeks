<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For The Street Geeks: A City Builder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#f0ede8;font-family:'DM Sans',sans-serif;overflow:hidden;user-select:none;cursor:default;}
  #canvas{display:block;position:absolute;top:0;left:0;}
  #panel{
    position:fixed;left:16px;top:50%;transform:translateY(-50%);
    background:#fff;border-radius:14px;
    box-shadow:0 4px 24px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.06);
    padding:14px 10px;width:190px;
    display:flex;flex-direction:column;gap:5px;
    z-index:100;max-height:90vh;overflow-y:auto;
  }
  #panel::-webkit-scrollbar{width:4px;}
  #panel::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px;}
  .panel-title{
    font-family:'DM Mono',monospace;font-size:10px;font-weight:500;
    color:#aaa;text-transform:uppercase;letter-spacing:.08em;
    padding:2px 6px 6px;border-bottom:1px solid #f0f0f0;margin-bottom:2px;
  }
  .road-btn{
    display:flex;align-items:center;gap:8px;padding:6px 8px;
    border-radius:8px;border:1.5px solid transparent;
    background:transparent;cursor:pointer;transition:all .12s;
    text-align:left;width:100%;
  }
  .road-btn:hover{background:#f7f7f7;}
  .road-btn.active{background:#e8f0fe;border-color:#4a80f5;}
  .road-btn .preview{width:36px;height:22px;flex-shrink:0;border-radius:3px;overflow:hidden;}
  .road-btn .label{font-size:11px;font-weight:500;color:#333;line-height:1.3;flex:1;}
  .road-btn .key-badge{
    font-family:'DM Mono',monospace;font-size:9px;color:#bbb;
    background:#f5f5f5;border-radius:4px;padding:1px 4px;flex-shrink:0;
  }
  .road-btn.active .key-badge{background:#c8d8fc;color:#4a80f5;}
  #topbar{
    position:fixed;top:16px;left:50%;transform:translateX(-50%);
    background:#fff;border-radius:999px;
    box-shadow:0 2px 16px rgba(0,0,0,.10);
    padding:8px 20px;display:flex;align-items:center;gap:16px;
    z-index:100;font-size:12px;color:#555;font-family:'DM Mono',monospace;
    white-space:nowrap;
  }
  .mode-label{font-weight:500;color:#222;font-size:12px;}
  .hint{color:#aaa;font-size:11px;}
  .mode-pill{
    background:#f0f0f0;border-radius:999px;padding:3px 12px;
    font-size:11px;font-weight:500;color:#666;transition:all .15s;
  }
  .mode-pill.build{background:#4a80f5;color:#fff;}
  .mode-pill.curve{background:#f5a623;color:#fff;}
  #nameInput{
    position:fixed;display:none;z-index:200;
    background:#fff;border:1.5px solid #4a80f5;border-radius:8px;
    padding:6px 10px;font-family:'DM Sans',sans-serif;font-size:13px;
    outline:none;box-shadow:0 4px 16px rgba(74,128,245,.15);width:180px;
  }
  #toast{
    position:fixed;bottom:24px;left:50%;
    transform:translateX(-50%) translateY(20px);
    background:#1a1a1a;color:#fff;padding:8px 18px;
    border-radius:999px;font-size:12px;font-family:'DM Mono',monospace;
    opacity:0;transition:all .2s;pointer-events:none;z-index:300;white-space:nowrap;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #zoomLabel{
    position:fixed;bottom:24px;right:24px;
    font-family:'DM Mono',monospace;font-size:11px;color:#aaa;
    background:#fff;padding:4px 10px;border-radius:999px;
    box-shadow:0 1px 6px rgba(0,0,0,.08);
  }
  #undoRedo{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    display:flex;gap:8px;z-index:100;
  }
  .ur-btn{
    background:#fff;border:none;border-radius:8px;padding:5px 14px;
    font-family:'DM Mono',monospace;font-size:11px;color:#555;cursor:pointer;
    box-shadow:0 1px 6px rgba(0,0,0,.10);transition:all .1s;
  }
  .ur-btn:hover{background:#f0f0f0;}
  .ur-btn:disabled{color:#ccc;cursor:default;background:#fff;}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="panel"><div class="panel-title">Road Type</div></div>
<div id="topbar">
  <span class="mode-pill" id="modePill">NAVIGATE</span>
  <span class="mode-label" id="modeLabel">ForTheStreetGeeks</span>
  <span class="hint" id="modeHint">SPACE=build · WASD=pan · 1/2/3=road group · P=cycle variant · I/O=zoom</span>
</div>
<input id="nameInput" type="text" placeholder="Street name (Enter to confirm)" maxlength="40"/>
<div id="toast"></div>
<div id="zoomLabel">100%</div>
<div id="undoRedo">
  <button class="ur-btn" id="btnUndo">↩ Undo</button>
  <button class="ur-btn" id="btnRedo">↪ Redo</button>
</div>
<script>
// ═══════════════════════════════════════════════════
//  ROAD TYPES
// ═══════════════════════════════════════════════════
const LANE_W={through:12,bus:12,bike:8,parking:9,service:14,median:12};
const ROAD_SURFACE='#a9b8c8', ROAD_EDGE='#a9b8c8', YELLOW='#ffebb2';
const BUS_COLOR='#b2a2ac', BIKE_COLOR='#80b3af', LABEL_BG='#6a7a8d';
const PARKING_COLOR='#9bacbe', PARKING_EDGE='#c3d5e5';

// Groups: each group is a category (shown as one panel row) with multiple variants.
// P key cycles variants within the active group mid-road.
// 1/2/3 keys select the group (and reset to variant 0).
const ROAD_GROUPS = [
  {
    key: '1', label: 'Two-Way', icon: '↔',
   variants: [
  {
    id:'twoway_std',
    label:'Standard',
    twoWay:true,
    lanes:[
      {type:'through',dir:-1},
      {type:'through',dir:1}
    ]
  },

  {
    id:'twoway_pkg',
    label:'+ Parking',
    twoWay:true,
    lanes:[
      {type:'parking',dir:-1},
      {type:'through',dir:-1},
      {type:'through',dir:1},
      {type:'parking',dir:1}
    ]
  },

  {
    id:'twoway_bike',
    label:'+ Bike',
    twoWay:true,
    lanes:[
      {type:'bike',dir:-1},
      {type:'through',dir:-1},
      {type:'through',dir:1},
      {type:'bike',dir:1}
    ]
  },

  {
    id:'twoway_bus',
    label:'+ Bus',
    twoWay:true,
    lanes:[
      {type:'bus',dir:-1},
      {type:'through',dir:-1},
      {type:'through',dir:1},
      {type:'bus',dir:1}
    ]
  },

  // ─────────────────────────────
  // rebalance;
  // parking/bike/bus moved outward
  // through lanes now hug the median
  // ─────────────────────────────

  {
    id:'twoway_median',
    label:'Median',
    twoWay:true,
    lanes:[
      {type:'parking',dir:-1},
      {type:'through',dir:-1},
      {type:'median',dir:0},
      {type:'through',dir:1},
      {type:'parking',dir:1}
    ]
  },

  {
    id:'twoway_med_bike',
    label:'Median + Bike',
    twoWay:true,
    lanes:[
      {type:'bike',dir:-1},
      {type:'through',dir:-1},
      {type:'median',dir:0},
      {type:'through',dir:1},
      {type:'bike',dir:1}
    ]
  },

  {
    id:'twoway_med_bus',
    label:'Median + Bus',
    twoWay:true,
    lanes:[
      {type:'bus',dir:-1},
      {type:'through',dir:-1},
      {type:'median',dir:0},
      {type:'through',dir:1},
      {type:'bus',dir:1}
    ]
  },
]
  },
  {
    key: '2', label: 'One-Way', icon: '→',
    variants: [
      {id:'oneway_1',        label:'Narrow (1 lane)',    twoWay:false, lanes:[{type:'through',dir:1}]},
      {id:'oneway_2',        label:'2 Lanes',            twoWay:false, lanes:[{type:'through',dir:1},{type:'through',dir:1}]},
      {id:'oneway_pkg',      label:'2 Lanes + Parking',  twoWay:false, lanes:[{type:'parking',dir:1},{type:'through',dir:1},{type:'through',dir:1},{type:'parking',dir:1}]},
      {id:'oneway_bike',     label:'+ Bike Lane',        twoWay:false, lanes:[{type:'bike',dir:1},{type:'through',dir:1},{type:'through',dir:1}]},
      {id:'oneway_bus',      label:'+ Bus Lane',         twoWay:false, lanes:[{type:'bus',dir:1},{type:'through',dir:1},{type:'through',dir:1}]},
      {id:'oneway_bus_bike', label:'+ Bus + Bike',       twoWay:false, lanes:[{type:'bike',dir:1},{type:'bus',dir:1},{type:'through',dir:1},{type:'through',dir:1}]},
    ]
  },
  {
    key: '3', label: 'Avenue', icon: '⇉',
    variants: [
      {id:'avenue',          label:'3 Lanes',            twoWay:false, lanes:[{type:'through',dir:1},{type:'through',dir:1},{type:'through',dir:1}]},
      {id:'avenue_pkg',      label:'+ Parking',          twoWay:false, lanes:[{type:'parking',dir:1},{type:'through',dir:1},{type:'through',dir:1},{type:'through',dir:1},{type:'parking',dir:1}]},
      {id:'avenue_bike',     label:'+ Bike Lane',        twoWay:false, lanes:[{type:'bike',dir:1},{type:'through',dir:1},{type:'through',dir:1},{type:'through',dir:1}]},
      {id:'avenue_bus',      label:'+ Bus Lane',         twoWay:false, lanes:[{type:'bus',dir:1},{type:'through',dir:1},{type:'through',dir:1},{type:'through',dir:1}]},
      {id:'avenue_bus_bike', label:'+ Bus + Bike',       twoWay:false, lanes:[{type:'bike',dir:1},{type:'bus',dir:1},{type:'through',dir:1},{type:'through',dir:1},{type:'through',dir:1}]},
    ]
  },
];

// Flatten for lookup
const ROAD_TYPES = ROAD_GROUPS.flatMap(g=>g.variants);
ROAD_TYPES.forEach(rt=>{ rt.totalWidth=rt.lanes.reduce((s,l)=>s+LANE_W[l.type],0); });

function getRoadGroup(typeId){
  for(const g of ROAD_GROUPS){ if(g.variants.find(v=>v.id===typeId)) return g; }
  return ROAD_GROUPS[0];
}
function getVariantIndex(typeId){
  const g=getRoadGroup(typeId);
  return g.variants.findIndex(v=>v.id===typeId);
}

// ═══════════════════════════════════════════════════
//  CANVAS / STATE
// ═══════════════════════════════════════════════════
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let W=window.innerWidth, H=window.innerHeight;
canvas.width=W; canvas.height=H;

let camX=0,camY=0,zoom=1;
const keys={};
let mouseX=0,mouseY=0;
let buildMode=false;
let curveMode=false;
let placedLabels = [];

// road: { typeId, waypoints:[{x,y}], segments:[null|{cpx,cpy}], name }
let currentRoad=null;
let roads=[];
let undoStack=[], redoStack=[];
let selectedTypeId=ROAD_TYPES[0].id;
let selectedGroupIdx=0;
let selectedVariantIdx=0;
let namingRoad=null;

// Parks: freehand painted green areas
let parks=[];
let parkMode=false;
let parkDrawing=false;
let currentParkPts=null;

// ═══════════════════════════════════════════════════
//  PANEL — 3 group rows, each shows active variant
// ═══════════════════════════════════════════════════
const panel=document.getElementById('panel');

// Build one button per group
const groupBtns=[];
ROAD_GROUPS.forEach((grp,gi)=>{
  const btn=document.createElement('button');
  btn.className='road-btn'+(gi===0?' active':'');
  btn.dataset.gi=gi;

  const prev=document.createElement('canvas');
  prev.width=36;prev.height=22;prev.className='preview';

  const lbl=document.createElement('span');lbl.className='label';

  const badge=document.createElement('span');
  badge.className='key-badge';badge.textContent=grp.key;

  btn.appendChild(prev);btn.appendChild(lbl);btn.appendChild(badge);
  btn.addEventListener('click',()=>selectGroup(gi));
  panel.appendChild(btn);
  groupBtns.push({btn,prev,lbl});
});

// Sub-label showing current variant name
const variantLabel=document.createElement('div');
variantLabel.style.cssText='font-size:10px;color:#888;padding:2px 8px 4px;font-family:"DM Mono",monospace;';
panel.appendChild(variantLabel);

function refreshPanel(){
  ROAD_GROUPS.forEach((grp,gi)=>{
    const vi = gi===selectedGroupIdx ? selectedVariantIdx : 0;
    const rt=grp.variants[vi];
    const {btn,prev,lbl}=groupBtns[gi];
    btn.classList.toggle('active',gi===selectedGroupIdx);
    lbl.textContent=grp.label;
    drawPreview(prev,rt);
  });
  const grp=ROAD_GROUPS[selectedGroupIdx];
  const rt=grp.variants[selectedVariantIdx];
  variantLabel.textContent='▸ '+rt.label;
}

function selectGroup(gi,vi){
  selectedGroupIdx=gi;
  if(vi===undefined) vi=0;
  selectedVariantIdx=vi;
  selectedTypeId=ROAD_GROUPS[gi].variants[vi].id;
  // If mid-road, change its type too
  if(currentRoad) currentRoad.typeId=selectedTypeId;
  refreshPanel();
  const rt=ROAD_GROUPS[gi].variants[vi];
  toast(ROAD_GROUPS[gi].label+' — '+rt.label);
  updateTopbar();
}

function cycleVariant(){
  // Cycle within current group
  const grp=ROAD_GROUPS[selectedGroupIdx];
  selectedVariantIdx=(selectedVariantIdx+1)%grp.variants.length;
  selectedTypeId=grp.variants[selectedVariantIdx].id;
  if(currentRoad) currentRoad.typeId=selectedTypeId;
  refreshPanel();
  toast(grp.label+' — '+grp.variants[selectedVariantIdx].label);
  updateTopbar();
}

function selectType(id){
  for(let gi=0;gi<ROAD_GROUPS.length;gi++){
    const vi=ROAD_GROUPS[gi].variants.findIndex(v=>v.id===id);
    if(vi>=0){selectGroup(gi,vi);return;}
  }
}

function drawPreview(cvs,rt){
  const c=cvs.getContext('2d'),pw=cvs.width,ph=cvs.height;
  c.clearRect(0,0,pw,ph);
  const scale=Math.min(pw/rt.totalWidth,1.2);
  const roadW=rt.totalWidth*scale,startX=(pw-roadW)/2;
  const roadH=ph*.72,y0=(ph-roadH)/2;
  c.fillStyle=ROAD_SURFACE;c.fillRect(startX,y0,roadW,roadH);
  let x=startX;
  rt.lanes.forEach((lane,i)=>{
    const lw=LANE_W[lane.type]*scale;
    if(lane.type==='bike')    {c.fillStyle=BIKE_COLOR;c.fillRect(x,y0,lw,roadH);}
    if(lane.type==='bus')     {c.fillStyle=BUS_COLOR;c.fillRect(x,y0,lw,roadH);}
    if(lane.type==='parking') {c.fillStyle=PARKING_COLOR;c.fillRect(x,y0,lw,roadH);}
    if(lane.type==='median'){
      // Draw median with diagonal hatch fill + double yellow border lines
      c.fillStyle=ROAD_SURFACE;c.fillRect(x,y0,lw,roadH);
      // Diagonal hatch
      c.save();c.beginPath();c.rect(x+1,y0,lw-2,roadH);c.clip();
      c.strokeStyle=YELLOW;c.lineWidth=0.8;c.setLineDash([]);c.lineCap='butt';
      const step=4;
      for(let hy=y0-lw;hy<y0+roadH+lw;hy+=step){
        c.beginPath();c.moveTo(x,hy);c.lineTo(x+lw,hy+lw);c.stroke();
      }
      c.restore();
      // Double yellow lines on each edge
      c.strokeStyle=YELLOW;c.lineWidth=0.8;c.setLineDash([]);
      [x+0.6,x+1.8].forEach(lx=>{
        c.beginPath();c.moveTo(lx,y0);c.lineTo(lx,y0+roadH);c.stroke();
      });
      [x+lw-1.8,x+lw-0.6].forEach(lx=>{
        c.beginPath();c.moveTo(lx,y0);c.lineTo(lx,y0+roadH);c.stroke();
      });
    }
    if(i<rt.lanes.length-1 && lane.type!=='median' && rt.lanes[i+1].type!=='median'){
      const isC=rt.twoWay&&i===Math.floor(rt.lanes.length/2)-1;
      const isPkg=(lane.type==='parking'||rt.lanes[i+1].type==='parking');
      if(isC){
        // Double yellow center line
        c.strokeStyle=YELLOW;c.lineWidth=0.8;c.setLineDash([]);
        c.beginPath();c.moveTo(x+lw-0.6,y0);c.lineTo(x+lw-0.6,y0+roadH);c.stroke();
        c.beginPath();c.moveTo(x+lw+0.6,y0);c.lineTo(x+lw+0.6,y0+roadH);c.stroke();
      } else {
        c.strokeStyle='#fff';c.lineWidth=0.8;
        c.setLineDash(isPkg?[]:[3,3]);
        c.beginPath();c.moveTo(x+lw,y0);c.lineTo(x+lw,y0+roadH);c.stroke();
        c.setLineDash([]);
      }
    }
    x+=lw;
  });

}

// ═══════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════
let toastTimer;
const toastEl=document.getElementById('toast');
const modePill=document.getElementById('modePill');
const modeLabel=document.getElementById('modeLabel');
const modeHint=document.getElementById('modeHint');
const zoomLabel=document.getElementById('zoomLabel');
const btnUndo=document.getElementById('btnUndo');
const btnRedo=document.getElementById('btnRedo');

function toast(msg){
  toastEl.textContent=msg;toastEl.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>toastEl.classList.remove('show'),2000);
}
function updateTopbar(){
  if(parkMode){
    modePill.className='mode-pill';modePill.style.background='#4caf50';modePill.style.color='#fff';
    modePill.textContent='PARK';
    modeLabel.textContent='Click & drag to paint greenery';
    modeHint.textContent='Drag=paint · Right-click=delete park · L/ESC=exit';
  } else if(curveMode&&buildMode){
    modePill.className='mode-pill curve';modePill.style.background='';modePill.style.color='';
    modePill.textContent='CURVE';
    modeLabel.textContent='Move mouse to bend · Click to set';
    modeHint.textContent='V=cancel curve · ESC=cancel road';
  } else if(buildMode){
    modePill.className='mode-pill build';modePill.style.background='';modePill.style.color='';
    modePill.textContent='BUILD';
    if(currentRoad){
      const n=currentRoad.waypoints.length;
      modeLabel.textContent=n+' pt'+(n!==1?'s':'');
      modeHint.textContent='CLICK=add · V=curve last seg · SPACE=finish · ESC=cancel';
    } else {
      modeLabel.textContent='Click to start (or click road endpoint to extend)';
      modeHint.textContent='SPACE=exit build · ESC=cancel';
    }
  } else {
    modePill.className='mode-pill';modePill.style.background='';modePill.style.color='';
    modePill.textContent='NAVIGATE';
    modeLabel.textContent='STREET GEEK';
    modeHint.textContent='SPACE=build · WASD/arrows=pan · I/O/scroll=zoom · 1/2/3=group · P=cycle · Shift=fast · Ctrl+Z/Y';
  }
  zoomLabel.textContent=Math.round(zoom*100)+'%';
  btnUndo.disabled=undoStack.length===0;
  btnRedo.disabled=redoStack.length===0;
}
function saveUndo(){undoStack.push(JSON.stringify({roads,parks}));redoStack=[];updateTopbar();}
function undo(){
  if(!undoStack.length)return;
  redoStack.push(JSON.stringify({roads,parks}));
  const s=JSON.parse(undoStack.pop());
  roads=s.roads||s;parks=s.parks||parks;
  updateTopbar();toast('Undo');
}
function redo(){
  if(!redoStack.length)return;
  undoStack.push(JSON.stringify({roads,parks}));
  const s=JSON.parse(redoStack.pop());
  roads=s.roads||s;parks=s.parks||parks;
  updateTopbar();toast('Redo');
}
btnUndo.addEventListener('click',undo);
btnRedo.addEventListener('click',redo);

// ═══════════════════════════════════════════════════
//  COORDINATE HELPERS
// ═══════════════════════════════════════════════════
function screenToWorld(sx,sy){return{x:(sx-W/2)/zoom+camX,y:(sy-H/2)/zoom+camY};}

function sampleRoad(road,stepsPerCurve=32){
  const wps=road.waypoints,segs=road.segments;
  if(wps.length<2)return wps.slice();
  const out=[];
  for(let i=0;i<wps.length-1;i++){
    const a=wps[i],b=wps[i+1],seg=segs[i];
    if(seg){
      for(let s=0;s<stepsPerCurve;s++){
        const t=s/stepsPerCurve,mt=1-t;
        out.push({x:mt*mt*a.x+2*mt*t*seg.cpx+t*t*b.x,y:mt*mt*a.y+2*mt*t*seg.cpy+t*t*b.y});
      }
    } else { out.push({x:a.x,y:a.y}); }
  }
  out.push(wps[wps.length-1]);
  return out;
}

// Build native canvas path — canvas handles joins/bezier geometry perfectly
function buildRoadPath(road,c){
  c=c||ctx;
  const wps=road.waypoints,segs=road.segments;
  if(wps.length<2)return;
  c.beginPath();c.moveTo(wps[0].x,wps[0].y);
  for(let i=0;i<wps.length-1;i++){
    const b=wps[i+1],seg=segs[i];
    if(seg) c.quadraticCurveTo(seg.cpx,seg.cpy,b.x,b.y);
    else    c.lineTo(b.x,b.y);
  }
}

function polyLen(pts){
  let l=0;
  for(let i=1;i<pts.length;i++){const dx=pts[i].x-pts[i-1].x,dy=pts[i].y-pts[i-1].y;l+=Math.sqrt(dx*dx+dy*dy);}
  return l;
}
function polyAt(pts,t){
  const total=polyLen(pts);
  let target=total*Math.max(0,Math.min(1,t)),acc=0;
  for(let i=1;i<pts.length;i++){
    const dx=pts[i].x-pts[i-1].x,dy=pts[i].y-pts[i-1].y;
    const sl=Math.sqrt(dx*dx+dy*dy);
    if(acc+sl>=target||i===pts.length-1){
      const f=sl>0?(target-acc)/sl:0;
      return{x:pts[i-1].x+dx*f,y:pts[i-1].y+dy*f,angle:Math.atan2(dy,dx)};
    }
    acc+=sl;
  }
  return{...pts[pts.length-1],angle:0};
}
function offsetPoly(pts,off){
  if(pts.length<2)return pts.map(p=>({x:p.x+off,y:p.y}));
  return pts.map((pt,i)=>{
    let dx,dy;
    if(i===0){dx=pts[1].x-pt.x;dy=pts[1].y-pt.y;}
    else if(i===pts.length-1){dx=pt.x-pts[i-1].x;dy=pt.y-pts[i-1].y;}
    else{dx=pts[i+1].x-pts[i-1].x;dy=pts[i+1].y-pts[i-1].y;}
    const len=Math.sqrt(dx*dx+dy*dy)||1;
    return{x:pt.x+(-dy/len)*off,y:pt.y+(dx/len)*off};
  });
}
function getRoadType(id){return ROAD_TYPES.find(r=>r.id===id)||ROAD_TYPES[0];}

// Build a canvas clip path that exactly follows a road's body outline.
// extraHw expands (or contracts) the clip beyond the nominal half-width.
// Two consecutive buildBodyClip+clip calls intersect → just the overlap area.
function buildBodyClip(road,extraHw){
  const rt=getRoadType(road.typeId);
  const hw=rt.totalWidth/2+(extraHw||0);
  const spine=sampleRoad(road,60);
  const left=offsetPoly(spine,-hw);
  const right=[...offsetPoly(spine,hw)].reverse();
  ctx.beginPath();
  ctx.moveTo(left[0].x,left[0].y);
  for(let i=1;i<left.length;i++)ctx.lineTo(left[i].x,left[i].y);
  for(const p of right)ctx.lineTo(p.x,p.y);
  ctx.closePath();
}

// ═══════════════════════════════════════════════════
//  INTERSECTION DETECTION  (body-crossing, any angle)
// ═══════════════════════════════════════════════════
const SNAP=14; // endpoint snap radius (world units)

// Segment–segment intersection test. Returns {x,y,tA,tB} or null.
function segIntersect(ax,ay,bx,by,cx,cy,dx,dy){
  const ex=bx-ax,ey=by-ay,fx=dx-cx,fy=dy-cy;
  const denom=ex*fy-ey*fx;
  if(Math.abs(denom)<1e-10)return null; // parallel
  const gx=cx-ax,gy=cy-ay;
  const tA=(gx*fy-gy*fx)/denom;
  const tB=(gx*ey-gy*ex)/denom;
  if(tA<0||tA>1||tB<0||tB>1)return null;
  return{x:ax+tA*ex,y:ay+tA*ey,tA,tB};
}

// Find all places where two polylines cross; return [{x,y,angA,angB}]
function polyCrossings(ptsA,ptsB){
  const hits=[];
  for(let i=0;i<ptsA.length-1;i++){
    for(let j=0;j<ptsB.length-1;j++){
      const h=segIntersect(ptsA[i].x,ptsA[i].y,ptsA[i+1].x,ptsA[i+1].y,
                           ptsB[j].x,ptsB[j].y,ptsB[j+1].x,ptsB[j+1].y);
      if(h){
        const angA=Math.atan2(ptsA[i+1].y-ptsA[i].y,ptsA[i+1].x-ptsA[i].x);
        const angB=Math.atan2(ptsB[j+1].y-ptsB[j].y,ptsB[j+1].x-ptsB[j].x);
        hits.push({x:h.x,y:h.y,angA,angB});
      }
    }
  }
  return hits;
}

// Merge crossing points that are very close (same physical junction hit twice)
function mergeCrossings(list,threshold=8){
  const out=[];
  list.forEach(c=>{
    const near=out.find(o=>{const dx=o.x-c.x,dy=o.y-c.y;return dx*dx+dy*dy<threshold*threshold;});
    if(!near)out.push({...c});
  });
  return out;
}

// Master: returns [{x,y,hwA,hwB,angA,angB}] for every pair of roads
function computeIntersections(roadList){
  const results=[];
  for(let i=0;i<roadList.length;i++){
    for(let j=i+1;j<roadList.length;j++){
      const rA=roadList[i],rB=roadList[j];
      const rtA=getRoadType(rA.typeId),rtB=getRoadType(rB.typeId);
      const spA=sampleRoad(rA,60),spB=sampleRoad(rB,60);
      const crossings=mergeCrossings(polyCrossings(spA,spB));
      crossings.forEach(c=>{
        results.push({x:c.x,y:c.y,hwA:rtA.totalWidth/2,hwB:rtB.totalWidth/2,angA:c.angA,angB:c.angB,roadA:rA,roadB:rB});
      });
    }
  }
  return results;
}

// ─── Draw one crossing patch ────────────────────────────────────────────────
// Strategy: clip-fill the parallelogram formed by the two road bands crossing.
// We stroke the native path of each road at the crossing — but the cleanest
// approach for arbitrary angles is: fill the convex hull of the 4 corner
// intersection points of the two road rectangles, then re-draw the road
// surface on top.  This gives an exact fill regardless of angle.

function roadCorners(cx,cy,hw,ang){
  // Returns 4 corners of the road rectangle centered at cx,cy
  // width=hw*2 along ang, infinite length — but we just need the 4 "width" vectors
  const px=Math.cos(ang),py=Math.sin(ang);   // along road
  const nx=-py,ny=px;                          // perpendicular (road width)
  // We project ±hw in the perp direction; for length we use a big number
  // but actually we only need the 4 corners of the CROSSING PATCH,
  // which is the intersection of two infinite bands. That's a parallelogram.
  return{px,py,nx:nx*hw,ny:ny*hw};
}

// Intersection of two infinite bands → parallelogram vertices
// Band A: center line through (cx,cy) at angA, half-width hwA
// Band B: center line through (cx,cy) at angB, half-width hwB
function crossingPatch(cx,cy,hwA,angA,hwB,angB){
  // direction vectors
  const dAx=Math.cos(angA),dAy=Math.sin(angA);
  const nAx=-dAy*hwA,nAy=dAx*hwA; // perp offset for road A
  const dBx=Math.cos(angB),dBy=Math.sin(angB);
  const nBx=-dBy*hwB,nBy=dBx*hwB; // perp offset for road B

  // The patch is bounded by 4 lines:
  //   A's left edge, A's right edge, B's left edge, B's right edge
  // Its 4 vertices are the 4 pairwise intersections of those edges.
  // Edge A+: through (cx+nAx, cy+nAy) in dir dA
  // Edge A-: through (cx-nAx, cy-nAy) in dir dA
  // Edge B+: through (cx+nBx, cy+nBy) in dir dB
  // Edge B-: through (cx-nBx, cy-nBy) in dir dB

  function lineLineIntersect(ox,oy,dx,dy,px,py,qx,qy){
    // line1: (ox,oy)+t*(dx,dy)  line2: (px,py)+s*(qx,qy)
    const denom=dx*qy-dy*qx;
    if(Math.abs(denom)<1e-10)return null;
    const t=((px-ox)*qy-(py-oy)*qx)/denom;
    return{x:ox+t*dx,y:oy+t*dy};
  }
  const verts=[];
  const edgesA=[
    {ox:cx+nAx,oy:cy+nAy,dx:dAx,dy:dAy},
    {ox:cx-nAx,oy:cy-nAy,dx:dAx,dy:dAy},
  ];
  const edgesB=[
    {ox:cx+nBx,oy:cy+nBy,dx:dBx,dy:dBy},
    {ox:cx-nBx,oy:cy-nBy,dx:dBx,dy:dBy},
  ];
  for(const a of edgesA)for(const b of edgesB){
    const v=lineLineIntersect(a.ox,a.oy,a.dx,a.dy,b.ox,b.oy,b.dx,b.dy);
    if(v)verts.push(v);
  }
  if(verts.length<3)return null;
  // Sort by angle around centroid for correct polygon winding
  const mx=verts.reduce((s,v)=>s+v.x,0)/verts.length;
  const my=verts.reduce((s,v)=>s+v.y,0)/verts.length;
  verts.sort((a,b)=>Math.atan2(a.y-my,a.x-mx)-Math.atan2(b.y-my,b.x-mx));
  return verts;
}

// ═══════════════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════════════
function strokePoly(pts,c){
  if(!pts||pts.length<2)return;
  c=c||ctx;
  c.beginPath();c.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++)c.lineTo(pts[i].x,pts[i].y);
  c.stroke();
}

// Pass A — outline + surface only (no decorations, no labels)
function drawRoadBase(road){
  const rt=getRoadType(road.typeId);
  if(road.waypoints.length<2)return;
  ctx.save();ctx.lineJoin='round';
  buildRoadPath(road);
  ctx.strokeStyle=ROAD_SURFACE;ctx.lineWidth=rt.totalWidth;
  ctx.lineCap='butt';ctx.stroke();
  ctx.restore();
}

// Pass B — lane fills, dividers, median hatching, BUS stencil
// Helper: fill a lane band as a polygon (left-side offsetPoly + right-side reversed)
// This avoids the butt-stroke artifacts on curves for colored lane fills.
function fillLaneBand(spine, offA, offB, color, alpha){
  if(spine.length<2)return;
  const left=offsetPoly(spine,offA);
  const right=offsetPoly(spine,offB);
  ctx.save();
  ctx.globalAlpha=alpha||1;
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(left[0].x,left[0].y);
  for(let i=1;i<left.length;i++)ctx.lineTo(left[i].x,left[i].y);
  for(let i=right.length-1;i>=0;i--)ctx.lineTo(right[i].x,right[i].y);
  ctx.closePath();ctx.fill();
  ctx.restore();
}

// Pass B — lane fills, dividers, median hatching, BUS stencil
function drawRoadDecorations(road){
  const rt=getRoadType(road.typeId);
  if(road.waypoints.length<2)return;
  const spine=sampleRoad(road,40);
  const hw=rt.totalWidth/2;
  const totalLen=polyLen(spine);
  ctx.save();ctx.lineJoin='round';

  // ── Lane fills (polygon-based, no stroke artifacts on curves) ──
  let lOff=-hw;
  rt.lanes.forEach((lane)=>{
    const lw=LANE_W[lane.type];
    if(lane.type==='bike')    fillLaneBand(spine,lOff,lOff+lw,BIKE_COLOR);
    if(lane.type==='bus')     fillLaneBand(spine,lOff,lOff+lw,BUS_COLOR);
    if(lane.type==='median')  fillLaneBand(spine,lOff,lOff+lw,ROAD_SURFACE);
    if(lane.type==='parking') fillLaneBand(spine,lOff,lOff+lw,PARKING_COLOR);
    lOff+=lw;
  });

  // ── Lane dividers ──
  lOff=-hw;ctx.lineCap='butt';
  rt.lanes.forEach((lane,li)=>{
    const lw=LANE_W[lane.type];
    if(li<rt.lanes.length-1){
      const divOff=lOff+lw;
      const nextLane=rt.lanes[li+1];
      const isMedianEdge=(lane.type==='median'||nextLane.type==='median');
      const isCenter=rt.twoWay&&!isMedianEdge&&li===Math.floor(rt.lanes.length/2)-1;
      if(isMedianEdge){
        // Two yellow lines tight against each side of median edge
        [-1.0,0.6].forEach(yo=>{
          const yl=offsetPoly(spine,divOff+yo);
          ctx.strokeStyle=YELLOW;ctx.lineWidth=0.9;ctx.setLineDash([]);strokePoly(yl);
        });
      } else if(isCenter){
        [-1.0,1.0].forEach(yo=>{
          const yl=offsetPoly(spine,divOff+yo);
          ctx.strokeStyle=YELLOW;ctx.lineWidth=0.9;ctx.setLineDash([]);strokePoly(yl);
        });
      } else if(lane.type==='parking'||nextLane.type==='parking'){
        const dl=offsetPoly(spine,divOff);
        // Outer edge of parking (road boundary): thin PARKING_EDGE
        // Inner edge (between parking and through lane): no line needed
        const isOuterEdge=(li===0)||(li===rt.lanes.length-2);
        if(isOuterEdge){
          ctx.strokeStyle=PARKING_EDGE;ctx.lineWidth=0.6;ctx.setLineDash([]);strokePoly(dl);
        }
      } else {
        const dl=offsetPoly(spine,divOff);
        ctx.strokeStyle='#fff';ctx.lineWidth=0.8;ctx.setLineDash([10,10]);
        strokePoly(dl);ctx.setLineDash([]);
      }
    }
    lOff+=lw;
  });
  ctx.setLineDash([]);

  // ── Median diagonal hatching — thin diagonal parallel lines ──
  lOff=-hw;
  rt.lanes.forEach((lane)=>{
    const lw=LANE_W[lane.type];
    if(lane.type==='median'){
      const medCenterOff=lOff+lw/2;
      const innerHw=lw/2-1.5;
      const stripeGap=12;  // spacing along road between stripe starts
      const skew=lw*0.9;   // diagonal offset — how far forward left edge is vs right
      const stripeCount=Math.max(2,Math.floor(totalLen/stripeGap));
      ctx.strokeStyle=YELLOW;ctx.lineWidth=1;ctx.lineCap='butt';ctx.setLineDash([]);
      for(let h=0;h<stripeCount;h++){
        const t=h/stripeCount;
        const pt=polyAt(spine,t);
        const ang=pt.angle,perp=ang+Math.PI/2;
        const cosA=Math.cos(ang),sinA=Math.sin(ang);
        const cosP=Math.cos(perp),sinP=Math.sin(perp);
        // Left edge: pushed forward (skewed), Right edge: no skew
        const lx=pt.x+cosP*(medCenterOff-innerHw)+cosA*skew;
        const ly=pt.y+sinP*(medCenterOff-innerHw)+sinA*skew;
        const rx=pt.x+cosP*(medCenterOff+innerHw);
        const ry=pt.y+sinP*(medCenterOff+innerHw);
        ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(rx,ry);ctx.stroke();
      }
    }
    lOff+=lw;
  });

  // ── BUS stencil along travel direction ──
lOff=-hw;
rt.lanes.forEach((lane)=>{
  const lw=LANE_W[lane.type];

  if(lane.type==='bus'){
    const busOff=lOff+lw/2;
    const stencilSpacing=100;
    const count=Math.max(1,Math.floor(totalLen/stencilSpacing));

    for(let s=0;s<count;s++){
      const t=(s+0.5)/count;
      const pt=polyAt(spine,t);

      let ang=pt.angle;
      if(lane.dir===-1) ang+=Math.PI;

      const perp=pt.angle+Math.PI/2;

      const tx=pt.x+Math.cos(perp)*busOff;
      const ty=pt.y+Math.sin(perp)*busOff;

     ctx.save();

    ctx.translate(tx,ty);
    ctx.rotate(ang);
    ctx.rotate(Math.PI / 2);
    
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillStyle='#fff';
    
    // Stretch this out
    ctx.scale(0.85, 1.8);
    
    // "only"
    ctx.font='700 4.8px "DM Sans",sans-serif';
    ctx.fillText('ONLY',0,-4);
    
    // "bus"
    ctx.font='900 8.2px "DM Sans",sans-serif';
    
    // horizontal stretch so this Gubby Ahh text
    // matches the text well
    ctx.scale(0.8,1);
    
    ctx.fillText('BUS',0,5.5);
    
    ctx.restore();
    }
  }

  lOff+=lw;
});

  ctx.restore();
}

// Pass D — street name labels, rendered LAST so they sit on top of everything

function drawRoadLabel(road){
  if(!road.name) return;
  const spine = sampleRoad(road,60);
  const totalLen = polyLen(spine);

  if(totalLen < 60) return;
  const text = road.name.toUpperCase();
  ctx.save();
  ctx.font = '600 8px "DM Sans",sans-serif';
  const textW = ctx.measureText(text).width;
  const minGap = textW + 40;
  const count = Math.max(
    1,
    Math.floor(totalLen / Math.max(minGap,140))
  );
  for(let i=0;i<count;i++){
    const t = (i + 0.5) / count;
    const pt = polyAt(spine,t);
    
    // ─────────────────────────────
    // Overlap check
    // ─────────────────────────────
    const box = {
      x: pt.x - textW/2 - 10,
      y: pt.y - 10,
      w: textW + 20,
      h: 20
    };

    let blocked = false;

    for(const other of placedLabels){
      if(!(
        box.x + box.w < other.x ||
        other.x + other.w < box.x ||
        box.y + box.h < other.y ||
        other.y + other.h < box.y
      )){
        blocked = true;
        break;
      }
    }

    if(blocked) continue;

    placedLabels.push(box);

    // ─────────────────────────────
    // Text
    // ─────────────────────────────
    const dirA = polyAt(spine, Math.max(0, t - 0.03));
    const dirB = polyAt(spine, Math.min(1, t + 0.03));

    let baseAng = Math.atan2(
      dirB.y - dirA.y,
      dirB.x - dirA.x
    );

    const flipLabel =
      baseAng > Math.PI/2 ||
      baseAng < -Math.PI/2;

    // ─────────────────────────────
    // Curve rendering
    // ─────────────────────────────
    ctx.save();

    ctx.font = '600 8px "DM Sans",sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    let offset = -textW / 2;

    for(const ch of text){
      const chW = ctx.measureText(ch).width;
      const charDist = offset + chW/2;
      const charT = t + (charDist / totalLen);

      if(charT < 0 || charT > 1){
        offset += chW;
        continue;
      }

      const ptA = polyAt(
        spine,
        Math.max(0,charT - 0.01)
      );

      const ptB = polyAt(
        spine,
        Math.min(1,charT + 0.01)
      );

      const charPt = polyAt(spine,charT);

      let charAng = Math.atan2(
        ptB.y - ptA.y,
        ptB.x - ptA.x
      );

      ctx.save();

      ctx.translate(charPt.x,charPt.y);
      ctx.rotate(charAng);

      // Outline
      ctx.strokeStyle = LABEL_BG;
      ctx.lineWidth = 1.2;
      ctx.lineJoin = 'round';

      ctx.strokeText(ch,0,0);

      // Fill
      ctx.fillStyle = '#fff';
      ctx.fillText(ch,0,0);

      ctx.restore();

      offset += chW;
    }
    ctx.restore();
  }
  ctx.restore();
}

// Full combined draw — used only for the build overlay preview
function drawRoad(road){
  drawRoadBase(road);
  drawRoadDecorations(road);
  drawRoadLabel(road);
}

// ═══════════════════════════════════════════════════
//  PARK DRAWING
// ═══════════════════════════════════════════════════
// Check if a world point is inside a park polygon (ray casting)
function pointInPark(px,py,pts){
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const xi=pts[i].x,yi=pts[i].y,xj=pts[j].x,yj=pts[j].y;
    if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi))inside=!inside;
  }
  return inside;
}

// Merge a new stroke into any park whose outline it touches/overlaps.
// Returns the merged parks array.
function mergeNewPark(newPts,existingParks){
  // Keep every park as its own point array
  return[...existingParks,newPts];
}

function drawParks(){
  if(parks.length===0&&!(parkDrawing&&currentParkPts))return;
  ctx.save();
  ctx.fillStyle='#c2f0d4';
  ctx.strokeStyle='#9ddbb5';
  ctx.lineWidth=1;
  ctx.lineJoin='round';
  ctx.lineCap='round';
  // Draw all parks in one path so overlapping areas merge via nonzero fill
  parks.forEach(pts=>{
    if(pts.length<2)return;
    ctx.beginPath();
    ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
    ctx.closePath();
    ctx.fill();
  });
  ctx.restore();

  // Draw in-progress park
  if(parkDrawing&&currentParkPts&&currentParkPts.length>1){
    ctx.save();
    ctx.fillStyle='rgba(194,240,212,0.55)';
    ctx.strokeStyle='#4caf50';
    ctx.lineWidth=1.5;
    ctx.setLineDash([5,5]);
    ctx.lineJoin='round';ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(currentParkPts[0].x,currentParkPts[0].y);
    for(let i=1;i<currentParkPts.length;i++)ctx.lineTo(currentParkPts[i].x,currentParkPts[i].y);
    ctx.closePath();
    ctx.fill();ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════
//  BUILD OVERLAY
// ═══════════════════════════════════════════════════
function drawBuildOverlay(){
  if(!currentRoad)return;
  const wps=currentRoad.waypoints;

  if(wps.length>=2) drawRoad(currentRoad);

  const mw=screenToWorld(mouseX,mouseY);
  const last=wps[wps.length-1];

  if(curveMode&&wps.length>=2){
    const a=wps[wps.length-2];
    const b=wps[wps.length-1];
    const midX=(a.x+b.x)/2,midY=(a.y+b.y)/2;
    const cpx=mw.x,cpy=mw.y;

    // Build a temporary road with the live control point for a real preview
    const rt=getRoadType(currentRoad.typeId);
    const previewRoad={
      typeId:currentRoad.typeId,
      waypoints:currentRoad.waypoints.slice(),
      segments:currentRoad.segments.slice()
    };
    // Override the last segment with the live cp
    previewRoad.segments[wps.length-2]={cpx,cpy};

    ctx.save();
    ctx.globalAlpha=0.5;
    drawRoad(previewRoad);
    ctx.globalAlpha=1;

    // Control handle
    ctx.strokeStyle='rgba(245,166,35,0.85)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(midX,midY);ctx.lineTo(cpx,cpy);ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();ctx.arc(midX,midY,4,0,Math.PI*2);
    ctx.fillStyle='rgba(245,166,35,0.5)';ctx.fill();
    ctx.beginPath();ctx.arc(cpx,cpy,5,0,Math.PI*2);
    ctx.fillStyle='#f5a623';ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    ctx.restore();

  } else {
    // Preview line to next click (or auto-curve arc if started from body snap)
    ctx.save();
    if(currentRoad._startSnap){
      const sn=currentRoad._startSnap;
      const p0=last;
      const dist=Math.sqrt((mw.x-p0.x)**2+(mw.y-p0.y)**2);
      const dirAng=Math.atan2(mw.y-p0.y,mw.x-p0.x);
      let dAng=Math.abs(dirAng-sn.tangentAngle)%(Math.PI*2);
      if(dAng>Math.PI)dAng=Math.PI*2-dAng;
      if(dAng>Math.PI/2)dAng=Math.PI-dAng;
      ctx.strokeStyle='rgba(74,128,245,0.45)';
      ctx.lineCap='round';ctx.lineJoin='round';ctx.setLineDash([]);
      if(dAng>0.44&&dist>10){
        // Curved departure preview
        const blend=dist*0.38;
        const cpx=p0.x+Math.cos(sn.tangentAngle)*blend;
        const cpy=p0.y+Math.sin(sn.tangentAngle)*blend;
        ctx.lineWidth=getRoadType(currentRoad.typeId).totalWidth*0.4;
        ctx.beginPath();ctx.moveTo(p0.x,p0.y);
        ctx.quadraticCurveTo(cpx,cpy,mw.x,mw.y);ctx.stroke();
      } else {
        // Straight preview — parallel enough to road
        ctx.lineWidth=1.5;ctx.setLineDash([6,6]);
        ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.lineTo(mw.x,mw.y);ctx.stroke();
        ctx.setLineDash([]);
      }
    } else {
      ctx.strokeStyle='rgba(74,128,245,0.45)';
      ctx.lineWidth=1.5;ctx.setLineDash([6,6]);ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(mw.x,mw.y);ctx.stroke();
      ctx.setLineDash([]);
    }
    const dist=Math.sqrt((mw.x-last.x)**2+(mw.y-last.y)**2);
    if(dist>10){
      const lx=(last.x+mw.x)/2,ly=(last.y+mw.y)/2;
      const ang=Math.atan2(mw.y-last.y,mw.x-last.x);
      ctx.save();ctx.translate(lx,ly);ctx.rotate(ang);
      ctx.font='500 9px "DM Mono",monospace';
      ctx.fillStyle='#4a80f5';ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(Math.round(dist*.3)+'m',0,-4);
      ctx.restore();
    }
    ctx.restore();
  }

  // Snap indicator
  const snapTarget=findSnapTarget(mw);
  if(snapTarget){
    ctx.save();
    ctx.beginPath();ctx.arc(snapTarget.x,snapTarget.y,8,0,Math.PI*2);
    ctx.strokeStyle=snapTarget.onBody?'#f5a623':'#4a80f5';
    ctx.lineWidth=2;ctx.stroke();
    ctx.restore();
  }

  // Waypoint dots
  wps.forEach((wp,i)=>{
    ctx.beginPath();ctx.arc(wp.x,wp.y,i===0?6:4,0,Math.PI*2);
    ctx.fillStyle=i===0?'#4a80f5':'#4caf50';
    ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
  });
}

// ═══════════════════════════════════════════════════
//  SNAP HELPER
// ═══════════════════════════════════════════════════
// Project point P onto segment AB, return closest point and distance²
function closestPointOnSegment(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay;
  const lenSq=dx*dx+dy*dy;
  if(lenSq<1e-10)return{x:ax,y:ay,d2:(px-ax)**2+(py-ay)**2};
  const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/lenSq));
  const cx=ax+t*dx,cy=ay+t*dy;
  return{x:cx,y:cy,d2:(px-cx)**2+(py-cy)**2};
}

function findSnapTarget(worldPos){
  const SNAP2=SNAP*SNAP;
  let best=null,bestD2=SNAP2;

  for(const r of roads){
    // 1. Endpoint snaps (higher priority — check first at tighter radius)
    for(const wp of[r.waypoints[0],r.waypoints[r.waypoints.length-1]]){
      const d2=(wp.x-worldPos.x)**2+(wp.y-worldPos.y)**2;
      if(d2<bestD2){bestD2=d2;best={x:wp.x,y:wp.y,onBody:false};}
    }
    // 2. Body snap — sample the road spine and check each segment
    const spine=sampleRoad(r,40);
    for(let i=0;i<spine.length-1;i++){
      const cp=closestPointOnSegment(worldPos.x,worldPos.y,
        spine[i].x,spine[i].y,spine[i+1].x,spine[i+1].y);
      if(cp.d2<bestD2){
        bestD2=cp.d2;
        const ang=Math.atan2(spine[i+1].y-spine[i].y,spine[i+1].x-spine[i].x);
        best={x:cp.x,y:cp.y,onBody:true,tangentAngle:ang,road:r};
      }
    }
  }
  return best;
}

// ═══════════════════════════════════════════════════
//  GRID
// ═══════════════════════════════════════════════════
function drawGrid(){
  const sp=40*zoom;
  const ox=((-camX*zoom+W/2)%sp+sp)%sp;
  const oy=((-camY*zoom+H/2)%sp+sp)%sp;
  ctx.strokeStyle='rgba(0,0,0,0.055)';ctx.lineWidth=1;ctx.setLineDash([]);
  for(let x=ox-sp;x<W+sp;x+=sp){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=oy-sp;y<H+sp;y+=sp){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

// ═══════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════
const nameInput=document.getElementById('nameInput');
document.addEventListener('keydown',e=>{
  if(document.activeElement===nameInput)return;
  keys[e.key]=true;
  // 1/2/3 = select group; P = cycle variant within group
  if(e.key==='1'){selectGroup(0);return;}
  if(e.key==='2'){selectGroup(1);return;}
  if(e.key==='3'){selectGroup(2);return;}
  if(e.key==='p'||e.key==='P'){cycleVariant();return;}
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();return;}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='Z'))){e.preventDefault();redo();return;}
  if(e.key===' '){
    e.preventDefault();
    if(buildMode&&currentRoad&&currentRoad.waypoints.length>=2){finishRoad();}
    else if(buildMode&&!currentRoad){buildMode=false;curveMode=false;toast('Navigate mode');}
    else if(!buildMode){buildMode=true;toast('Build mode');}
    updateTopbar();
  }
  if(e.key==='Escape'){currentRoad=null;buildMode=false;curveMode=false;updateTopbar();}
  if((e.key==='v'||e.key==='V')&&buildMode&&currentRoad&&currentRoad.waypoints.length>=2){
    curveMode=!curveMode;
    toast(curveMode?'Curve mode — move mouse to bend, click to set':'Curve cancelled');
    updateTopbar();
  }
  if(e.key==='i'||e.key==='I'){zoom=Math.min(zoom*1.15,6);updateTopbar();}
  if(e.key==='o'||e.key==='O'){zoom=Math.max(zoom/1.15,0.1);updateTopbar();}
  if(e.key==='l'||e.key==='L'){
    parkMode=!parkMode;
    if(parkMode){buildMode=false;currentRoad=null;curveMode=false;}
    toast(parkMode?'Park paint mode — click & drag':'Navigate mode');
    updateTopbar();
  }
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
canvas.addEventListener('mousemove',e=>{
  mouseX=e.clientX;mouseY=e.clientY;
  if(parkMode&&parkDrawing&&currentParkPts){
    const w=screenToWorld(e.clientX,e.clientY);
    // Thin out points: only add if moved >4 world units
    const last=currentParkPts[currentParkPts.length-1];
    if(Math.hypot(w.x-last.x,w.y-last.y)>4){
      currentParkPts.push({x:w.x,y:w.y});
    }
  }
});
canvas.addEventListener('mousedown',e=>{
  if(!parkMode)return;
  parkDrawing=true;
  const w=screenToWorld(e.clientX,e.clientY);
  currentParkPts=[{x:w.x,y:w.y}];
});
canvas.addEventListener('mouseup',e=>{
  if(!parkMode||!parkDrawing)return;
  parkDrawing=false;
  if(currentParkPts&&currentParkPts.length>3){
    saveUndo();
    parks=mergeNewPark(currentParkPts,parks);
  }
  currentParkPts=null;
});

// Right-click in park mode: delete park under cursor
canvas.addEventListener('contextmenu',e=>{
  if(!parkMode)return;
  e.preventDefault();
  const w=screenToWorld(e.clientX,e.clientY);
  const idx=parks.findIndex(pts=>pointInPark(w.x,w.y,pts));
  if(idx>=0){
    saveUndo();
    parks.splice(idx,1);
    toast('Park removed');
  }
});

// Find the road whose START or END endpoint is within radius of worldPos
function findEndpointRoad(worldPos,radius){
  const r2=radius*radius;
  for(const r of roads){
    const s=r.waypoints[0], e=r.waypoints[r.waypoints.length-1];
    if((s.x-worldPos.x)**2+(s.y-worldPos.y)**2<r2) return{road:r,end:'start'};
    if((e.x-worldPos.x)**2+(e.y-worldPos.y)**2<r2) return{road:r,end:'end'};
  }
  return null;
}

canvas.addEventListener('click',e=>{
  if(parkMode)return; // park uses mousedown/move/up
  if(!buildMode)return;
  const raw=screenToWorld(e.clientX,e.clientY);
  const snap=findSnapTarget(raw);
  const w=snap||raw;

  if(!currentRoad){
    // Feature 3: click near existing road endpoint → extend that road
    const epHit=findEndpointRoad(raw,SNAP*1.4);
    if(epHit){
      const r=epHit.road;
      // Remove it from placed roads (we re-place it on finishRoad)
      saveUndo();
      roads.splice(roads.indexOf(r),1);
      if(epHit.end==='end'){
        // Continue from the end — just keep as-is, user adds more points
        currentRoad=r;
      } else {
        // Continue from the start — reverse so user appends from the other end
        r.waypoints.reverse();
        r.segments.reverse().forEach(s=>{ /* no cp flip needed for straight segs */ });
        currentRoad=r;
      }
      buildMode=true;
      toast('Extending road: '+( r.name||'unnamed'));
      updateTopbar();return;
    }

    // Never auto-curve when starting on a body snap — always straight
    currentRoad={typeId:selectedTypeId,waypoints:[{x:w.x,y:w.y}],segments:[],name:'',
      _startSnap:null
    };
    updateTopbar();return;
  }

  if(curveMode&&currentRoad.waypoints.length>=2){
    const si=currentRoad.waypoints.length-2;
    currentRoad.segments[si]={cpx:w.x,cpy:w.y};
    curveMode=false;toast('Curve set');updateTopbar();return;
  }

  // If this is the second waypoint and we started on a body snap, auto-insert
  // a smooth tangent departure curve — but only if the departure angle is
  // significant (>25°). If near-parallel, just go straight.
  if(currentRoad.waypoints.length===1 && currentRoad._startSnap){
    const sn=currentRoad._startSnap;
    const p0=currentRoad.waypoints[0];
    const p1={x:w.x,y:w.y};
    const dist=Math.sqrt((p1.x-p0.x)**2+(p1.y-p0.y)**2);
    // Angle between road tangent and direction to second click
    const dirAng=Math.atan2(p1.y-p0.y,p1.x-p0.x);
    let dAng=Math.abs(dirAng-sn.tangentAngle)%(Math.PI*2);
    if(dAng>Math.PI)dAng=Math.PI*2-dAng;
    // Normalise to [0,π/2] — we don't care about parallel vs anti-parallel
    if(dAng>Math.PI/2)dAng=Math.PI-dAng;
    currentRoad.waypoints.push(p1);
    if(dAng>0.44&&dist>10){ // ~25° threshold
      const blend=dist*0.38;
      const cpx=p0.x+Math.cos(sn.tangentAngle)*blend;
      const cpy=p0.y+Math.sin(sn.tangentAngle)*blend;
      currentRoad.segments.push({cpx,cpy});
    } else {
      currentRoad.segments.push(null);
    }
    currentRoad._startSnap=null;
    updateTopbar();return;
  }

  currentRoad.waypoints.push({x:w.x,y:w.y});
  currentRoad.segments.push(null);
  updateTopbar();
});

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  zoom=Math.max(0.1,Math.min(6,zoom*(e.deltaY<0?1.1:1/1.1)));
  updateTopbar();
},{passive:false});

// ═══════════════════════════════════════════════════
//  AUTO-CONNECT: extend road endpoints to nearby roads
// ═══════════════════════════════════════════════════
const AUTO_CONNECT_RADIUS=28;

function autoConnectEndpoints(road){
  const endpointDefs=[
    {isStart:true},
    {isStart:false}
  ];
  endpointDefs.forEach(({isStart})=>{
    const pt=isStart?road.waypoints[0]:road.waypoints[road.waypoints.length-1];
    let bestD=AUTO_CONNECT_RADIUS, bestPt=null;
    for(const r of roads){
      if(r===road)continue;
      const spine=sampleRoad(r,60);
      // Endpoint priority
      for(const wp of[spine[0],spine[spine.length-1]]){
        const d=Math.hypot(wp.x-pt.x,wp.y-pt.y);
        if(d<bestD){bestD=d;bestPt={x:wp.x,y:wp.y};}
      }
      // Body
      for(let i=0;i<spine.length-1;i++){
        const cp=closestPointOnSegment(pt.x,pt.y,spine[i].x,spine[i].y,spine[i+1].x,spine[i+1].y);
        const d=Math.sqrt(cp.d2);
        if(d<bestD){bestD=d;bestPt={x:cp.x,y:cp.y};}
      }
    }
    if(bestPt){
      const dist=Math.hypot(bestPt.x-pt.x,bestPt.y-pt.y);
      if(dist>1){
        if(isStart){
          road.waypoints.unshift({x:bestPt.x,y:bestPt.y});
          road.segments.unshift(null);
        } else {
          road.waypoints.push({x:bestPt.x,y:bestPt.y});
          road.segments.push(null);
        }
      }
    }
  });
}

// ═══════════════════════════════════════════════════
//  FINISH ROAD / NAMING
// ═══════════════════════════════════════════════════
function finishRoad(){
  autoConnectEndpoints(currentRoad);
  const spine=sampleRoad(currentRoad,8);
  const mid=polyAt(spine,0.5);
  const sx=(mid.x-camX)*zoom+W/2;
  const sy=(mid.y-camY)*zoom+H/2;
  nameInput.style.display='block';
  nameInput.style.left=Math.max(8,sx-90)+'px';
  nameInput.style.top=Math.max(8,sy-40)+'px';
  nameInput.value='';nameInput.focus();
  namingRoad=currentRoad;currentRoad=null;curveMode=false;buildMode=false;
  updateTopbar();
}
nameInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'||e.key==='Escape'){
    if(namingRoad){
      namingRoad.name=nameInput.value.trim();
      saveUndo();roads.push(namingRoad);namingRoad=null;
    }
    nameInput.style.display='none';nameInput.value='';
    toast('Road placed!');updateTopbar();
  }
});

// ═══════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════
function loop(){
  const speed=(keys['Shift']?14:5)/zoom;
  if(keys['w']||keys['ArrowUp'])   camY-=speed;
  if(keys['s']||keys['ArrowDown']) camY+=speed;
  if(keys['a']||keys['ArrowLeft']) camX-=speed;
  if(keys['d']||keys['ArrowRight'])camX+=speed;

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#f0ede8';ctx.fillRect(0,0,W,H);
  drawGrid();

  ctx.save();
  ctx.translate(W/2-camX*zoom,H/2-camY*zoom);
  ctx.scale(zoom,zoom);

  // Compute true body-crossing intersections
  const intersections=computeIntersections(roads);

  // Parks drawn below roads
  drawParks();

  // Pass 1 — road outlines + surfaces (no lane deco, no labels)
  roads.forEach(r=>drawRoadBase(r));

  // Pass 2 — lane decorations (bike/bus fills, center lines, dashes)
  //           drawn before patches so the patches erase them cleanly at crossings
  roads.forEach(r=>drawRoadDecorations(r));

  // Pass 3 — intersection patches using actual road body shapes as clip regions.
  //   buildBodyClip twice + ctx.clip() intersects the two clip regions so only
  //   the true overlap area is filled — no parallelogram approximation, works
  //   correctly for curved roads. Pairs are deduplicated so we don't double-fill
  //   when two roads cross more than once.
  const patchedPairs=new Set();
  intersections.forEach(ix=>{
    const idxA=roads.indexOf(ix.roadA),idxB=roads.indexOf(ix.roadB);
    const key=Math.min(idxA,idxB)+'-'+Math.max(idxA,idxB);
    if(patchedPairs.has(key))return;
    patchedPairs.add(key);
    // Surface fill only — road borders at the intersection boundary come naturally
    // from the Pass-1 outline strokes; adding a ROAD_EDGE ring here paints dark
    // lines across whichever road the other road crosses, causing the visible outline.
    ctx.save();
    buildBodyClip(ix.roadA,0.5);ctx.clip();
    buildBodyClip(ix.roadB,0.5);ctx.clip();
    ctx.fillStyle=ROAD_SURFACE;ctx.fillRect(-1e6,-1e6,2e6,2e6);
    ctx.restore();
  });

  // Pass 4 — street name labels rendered on top of all geometry
  placedLabels = [];
  roads.forEach(r=>drawRoadLabel(r));

  drawBuildOverlay();
  ctx.restore();

  requestAnimationFrame(loop);
}

window.addEventListener('resize',()=>{W=window.innerWidth;H=window.innerHeight;canvas.width=W;canvas.height=H;});
refreshPanel();
updateTopbar();
loop();
</script>
